<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CogWeb — Coglet Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; background: #0d1117; color: #c9d1d9; overflow: hidden; }
    #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { height: 40px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
    .header h1 { font-size: 14px; font-weight: 600; color: #58a6ff; }
    .header .status { font-size: 11px; color: #8b949e; }
    .header .status.connected { color: #3fb950; }
    .header .btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: inherit; }
    .header .btn:hover { background: #30363d; }

    /* Main layout */
    .main { flex: 1; display: flex; overflow: hidden; }

    /* Canvas */
    .canvas { flex: 1; position: relative; overflow: hidden; }
    .canvas svg { width: 100%; height: 100%; }

    /* Inspector panel */
    .inspector { width: 300px; background: #161b22; border-left: 1px solid #30363d; overflow-y: auto; flex-shrink: 0; }
    .inspector.hidden { display: none; }
    .inspector h2 { font-size: 12px; font-weight: 600; padding: 12px 16px 8px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
    .inspector .section { padding: 8px 16px; border-bottom: 1px solid #21262d; }
    .inspector .section h3 { font-size: 11px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .inspector .field { font-size: 12px; padding: 2px 0; }
    .inspector .field .label { color: #8b949e; }
    .inspector .field .value { color: #c9d1d9; }
    .inspector .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; margin: 1px 2px; }
    .inspector .badge.mixin { background: #1f3a5f; color: #58a6ff; }
    .inspector .badge.channel { background: #1a3a2a; color: #3fb950; }
    .inspector .badge.command { background: #3d1f1f; color: #f85149; }

    /* Graph nodes */
    .coglet-node { background: #161b22; border: 1px solid #30363d; border-radius: 8px; min-width: 180px; cursor: grab; user-select: none; }
    .coglet-node.selected { border-color: #58a6ff; box-shadow: 0 0 0 1px #58a6ff; }
    .coglet-node.status-error { border-color: #f85149; }
    .coglet-node.status-stopped { border-color: #8b949e; opacity: 0.6; }
    .coglet-node .node-header { padding: 8px 12px 4px; border-bottom: 1px solid #21262d; }
    .coglet-node .node-header .class-name { font-size: 13px; font-weight: 600; color: #e6edf3; }
    .coglet-node .node-header .node-id { font-size: 9px; color: #484f58; margin-top: 1px; }
    .coglet-node .node-body { padding: 6px 12px 8px; }
    .coglet-node .mixins { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 4px; }
    .coglet-node .mixin-tag { font-size: 9px; padding: 1px 5px; border-radius: 8px; background: #1f3a5f; color: #58a6ff; }
    .coglet-node .ports { display: flex; justify-content: space-between; gap: 8px; }
    .coglet-node .port-group { display: flex; flex-direction: column; gap: 2px; }
    .coglet-node .port-group.inputs { align-items: flex-start; }
    .coglet-node .port-group.outputs { align-items: flex-end; }
    .coglet-node .port { font-size: 10px; display: flex; align-items: center; gap: 4px; }
    .coglet-node .port .dot { width: 6px; height: 6px; border-radius: 50%; }
    .coglet-node .port .dot.listen { background: #58a6ff; }
    .coglet-node .port .dot.enact { background: #f85149; }
    .coglet-node .port .dot.transmit { background: #3fb950; }

    /* Edge styles */
    .edge-data { stroke: #58a6ff; stroke-width: 1.5; fill: none; opacity: 0.6; }
    .edge-control { stroke: #f85149; stroke-width: 1.5; fill: none; stroke-dasharray: 6 3; opacity: 0.6; }
    .edge-observe { stroke: #8b949e; stroke-width: 1; fill: none; stroke-dasharray: 2 2; opacity: 0.4; }

    /* Minimap */
    .minimap { position: absolute; bottom: 12px; right: 12px; width: 160px; height: 100px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; opacity: 0.8; overflow: hidden; }
    .minimap .viewport { border: 1px solid #58a6ff; position: absolute; background: rgba(88, 166, 255, 0.05); }

    /* Stats bar */
    .stats { height: 24px; background: #161b22; border-top: 1px solid #30363d; display: flex; align-items: center; padding: 0 16px; gap: 16px; font-size: 11px; color: #8b949e; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>CogWeb</h1>
    <span id="conn-status" class="status">disconnected</span>
    <div style="flex:1"></div>
    <button class="btn" onclick="fitToScreen()">Fit</button>
    <button class="btn" onclick="toggleAutoLayout()">Auto Layout</button>
    <button class="btn" onclick="toggleInspector()">Inspector</button>
    <button class="btn" onclick="requestRefresh()">Refresh</button>
  </div>
  <div class="main">
    <div class="canvas" id="canvas">
      <svg id="graph-svg">
        <defs>
          <marker id="arrowhead-data" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6" fill="#58a6ff" opacity="0.6" />
          </marker>
          <marker id="arrowhead-control" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6" fill="#f85149" opacity="0.6" />
          </marker>
        </defs>
        <g id="transform-group">
          <g id="edges-group"></g>
          <g id="nodes-group"></g>
        </g>
      </svg>
      <div class="minimap" id="minimap">
        <canvas id="minimap-canvas" width="160" height="100"></canvas>
        <div class="viewport" id="minimap-viewport"></div>
      </div>
    </div>
    <div class="inspector" id="inspector">
      <h2>Inspector</h2>
      <div id="inspector-content">
        <div class="section">
          <p class="field" style="color: #484f58; font-size: 11px;">Select a node to inspect</p>
        </div>
      </div>
    </div>
  </div>
  <div class="stats" id="stats">
    <span id="stat-nodes">Nodes: 0</span>
    <span id="stat-edges">Edges: 0</span>
    <span id="stat-zoom">Zoom: 100%</span>
  </div>
</div>

<script>
// ============================================================
// CogWeb UI — Pure JS graph visualization for Coglet trees
// ============================================================

const state = {
  graph: { nodes: {}, edges: [] },
  positions: {},       // node_id -> {x, y}
  selected: null,      // selected node_id
  ws: null,
  connected: false,
  autoLayout: true,
  // Pan/zoom
  pan: { x: 0, y: 0 },
  zoom: 1,
  dragging: null,      // {nodeId, offsetX, offsetY}
  panning: false,
  panStart: { x: 0, y: 0 },
  panStartMouse: { x: 0, y: 0 },
};

// ---- WebSocket ----

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws`;
  const ws = new WebSocket(url);

  ws.onopen = () => {
    state.connected = true;
    state.ws = ws;
    updateConnectionStatus();
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'snapshot') {
      handleSnapshot(msg.data);
    }
  };

  ws.onclose = () => {
    state.connected = false;
    state.ws = null;
    updateConnectionStatus();
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => ws.close();
}

function updateConnectionStatus() {
  const el = document.getElementById('conn-status');
  el.textContent = state.connected ? 'connected' : 'disconnected';
  el.className = state.connected ? 'status connected' : 'status';
}

function requestRefresh() {
  if (state.ws && state.connected) {
    state.ws.send(JSON.stringify({ type: 'refresh' }));
  }
}

// ---- Graph data ----

function handleSnapshot(data) {
  state.graph = data;
  if (state.autoLayout) {
    layoutGraph();
  } else {
    // Add positions for new nodes only
    for (const nid of Object.keys(data.nodes)) {
      if (!state.positions[nid]) {
        state.positions[nid] = { x: Math.random() * 600 + 50, y: Math.random() * 400 + 50 };
      }
    }
  }
  render();
}

// ---- Hierarchical layout (simple Sugiyama-style) ----

function layoutGraph() {
  const nodes = state.graph.nodes;
  const nodeIds = Object.keys(nodes);
  if (nodeIds.length === 0) return;

  // Build parent->children map from node data
  const childrenOf = {};
  const hasParent = new Set();
  for (const nid of nodeIds) {
    const node = nodes[nid];
    childrenOf[nid] = (node.children || []).filter(cid => nodes[cid]);
    for (const cid of childrenOf[nid]) {
      hasParent.add(cid);
    }
  }

  // Find roots
  const roots = nodeIds.filter(nid => !hasParent.has(nid));
  if (roots.length === 0) roots.push(nodeIds[0]);

  // Assign levels via BFS
  const levels = {};
  const queue = [...roots.map(r => [r, 0])];
  const visited = new Set();
  while (queue.length > 0) {
    const [nid, level] = queue.shift();
    if (visited.has(nid)) continue;
    visited.add(nid);
    levels[nid] = level;
    for (const cid of (childrenOf[nid] || [])) {
      queue.push([cid, level + 1]);
    }
  }

  // Handle orphans
  let maxLevel = Math.max(0, ...Object.values(levels));
  for (const nid of nodeIds) {
    if (!(nid in levels)) {
      levels[nid] = ++maxLevel;
    }
  }

  // Group by level
  const byLevel = {};
  for (const [nid, lvl] of Object.entries(levels)) {
    if (!byLevel[lvl]) byLevel[lvl] = [];
    byLevel[lvl].push(nid);
  }

  // Position
  const nodeW = 200;
  const nodeH = 100;
  const gapX = 60;
  const gapY = 80;

  const sortedLevels = Object.keys(byLevel).sort((a, b) => a - b);
  for (const lvl of sortedLevels) {
    const row = byLevel[lvl];
    const totalW = row.length * nodeW + (row.length - 1) * gapX;
    const startX = -totalW / 2 + nodeW / 2;
    for (let i = 0; i < row.length; i++) {
      state.positions[row[i]] = {
        x: startX + i * (nodeW + gapX),
        y: parseInt(lvl) * (nodeH + gapY),
      };
    }
  }
}

// ---- Rendering ----

function render() {
  renderNodes();
  renderEdges();
  updateStats();
  renderMinimap();
}

function renderNodes() {
  const group = document.getElementById('nodes-group');
  group.innerHTML = '';
  const nodes = state.graph.nodes;

  for (const [nid, node] of Object.entries(nodes)) {
    const pos = state.positions[nid] || { x: 0, y: 0 };
    const fo = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
    fo.setAttribute('x', pos.x);
    fo.setAttribute('y', pos.y);
    fo.setAttribute('width', 200);
    fo.setAttribute('height', 160);
    fo.setAttribute('data-node-id', nid);

    const statusClass = node.status !== 'running' ? ` status-${node.status}` : '';
    const selectedClass = state.selected === nid ? ' selected' : '';

    const mixinTags = (node.mixins || [])
      .map(m => `<span class="mixin-tag">${m}</span>`)
      .join('');

    const listenPorts = (node.listen_channels || [])
      .map(ch => `<div class="port"><span class="dot listen"></span>${ch}</div>`)
      .join('');

    const enactPorts = (node.enact_commands || [])
      .map(cmd => `<div class="port"><span class="dot enact"></span>${cmd}</div>`)
      .join('');

    const channelNames = Object.keys(node.channels || {});
    const transmitPorts = channelNames
      .map(ch => `<div class="port">${ch}<span class="dot transmit"></span></div>`)
      .join('');

    const shortId = nid.length > 20 ? nid.slice(0, 20) + '...' : nid;

    fo.innerHTML = `
      <div xmlns="http://www.w3.org/1999/xhtml"
           class="coglet-node${statusClass}${selectedClass}"
           data-node-id="${nid}">
        <div class="node-header">
          <div class="class-name">${node.class_name}</div>
          <div class="node-id">${shortId}</div>
        </div>
        <div class="node-body">
          <div class="mixins">${mixinTags}</div>
          <div class="ports">
            <div class="port-group inputs">
              ${listenPorts}
              ${enactPorts}
            </div>
            <div class="port-group outputs">
              ${transmitPorts}
            </div>
          </div>
        </div>
      </div>
    `;
    group.appendChild(fo);
  }
}

function renderEdges() {
  const group = document.getElementById('edges-group');
  group.innerHTML = '';
  const nodes = state.graph.nodes;
  const edges = state.graph.edges || [];

  // Draw hierarchy edges (parent->child from node.children)
  for (const [nid, node] of Object.entries(nodes)) {
    for (const cid of (node.children || [])) {
      if (!state.positions[cid]) continue;
      drawEdge(group, nid, cid, 'control');
    }
  }

  // Draw explicit edges from registry
  for (const edge of edges) {
    if (edge.kind === 'control') continue; // already drawn from hierarchy
    drawEdge(group, edge.from, edge.to, edge.kind || 'data');
  }
}

function drawEdge(group, fromId, toId, kind) {
  const fromPos = state.positions[fromId];
  const toPos = state.positions[toId];
  if (!fromPos || !toPos) return;

  const x1 = fromPos.x + 100;  // center of node
  const y1 = fromPos.y + 140;  // bottom of node
  const x2 = toPos.x + 100;    // center of node
  const y2 = toPos.y;           // top of node

  const midY = (y1 + y2) / 2;

  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', `M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}`);

  const className = kind === 'control' ? 'edge-control' :
                    kind === 'observe' ? 'edge-observe' : 'edge-data';
  path.setAttribute('class', className);

  const markerId = kind === 'control' ? 'arrowhead-control' : 'arrowhead-data';
  path.setAttribute('marker-end', `url(#${markerId})`);

  group.appendChild(path);
}

function updateStats() {
  const nodes = Object.keys(state.graph.nodes).length;
  const edges = (state.graph.edges || []).length;
  document.getElementById('stat-nodes').textContent = `Nodes: ${nodes}`;
  document.getElementById('stat-edges').textContent = `Edges: ${edges}`;
  document.getElementById('stat-zoom').textContent = `Zoom: ${Math.round(state.zoom * 100)}%`;
}

function renderMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 160, 100);

  const positions = Object.values(state.positions);
  if (positions.length === 0) return;

  const minX = Math.min(...positions.map(p => p.x)) - 50;
  const maxX = Math.max(...positions.map(p => p.x)) + 250;
  const minY = Math.min(...positions.map(p => p.y)) - 50;
  const maxY = Math.max(...positions.map(p => p.y)) + 200;
  const scaleX = 160 / (maxX - minX || 1);
  const scaleY = 100 / (maxY - minY || 1);
  const scale = Math.min(scaleX, scaleY);

  ctx.fillStyle = '#30363d';
  for (const pos of positions) {
    const x = (pos.x - minX) * scale;
    const y = (pos.y - minY) * scale;
    ctx.fillRect(x, y, 8, 5);
  }
}

// ---- Interaction ----

function setupInteraction() {
  const svg = document.getElementById('graph-svg');
  const tg = document.getElementById('transform-group');

  function applyTransform() {
    tg.setAttribute('transform', `translate(${state.pan.x},${state.pan.y}) scale(${state.zoom})`);
  }

  // Click to select
  svg.addEventListener('click', (e) => {
    const nodeEl = e.target.closest('[data-node-id]');
    if (nodeEl) {
      state.selected = nodeEl.getAttribute('data-node-id');
    } else {
      state.selected = null;
    }
    updateInspector();
    render();
  });

  // Drag nodes
  svg.addEventListener('mousedown', (e) => {
    const nodeEl = e.target.closest('[data-node-id]');
    if (nodeEl && e.button === 0) {
      const nid = nodeEl.getAttribute('data-node-id');
      const pos = state.positions[nid];
      if (pos) {
        state.dragging = {
          nodeId: nid,
          offsetX: (e.clientX - state.pan.x) / state.zoom - pos.x,
          offsetY: (e.clientY - state.pan.y) / state.zoom - pos.y,
        };
        state.autoLayout = false;
        e.preventDefault();
        return;
      }
    }
    // Pan
    if (e.button === 0 && !nodeEl) {
      state.panning = true;
      state.panStartMouse = { x: e.clientX, y: e.clientY };
      state.panStart = { ...state.pan };
      e.preventDefault();
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (state.dragging) {
      const nid = state.dragging.nodeId;
      state.positions[nid] = {
        x: (e.clientX - state.pan.x) / state.zoom - state.dragging.offsetX,
        y: (e.clientY - state.pan.y) / state.zoom - state.dragging.offsetY,
      };
      render();
    } else if (state.panning) {
      state.pan.x = state.panStart.x + (e.clientX - state.panStartMouse.x);
      state.pan.y = state.panStart.y + (e.clientY - state.panStartMouse.y);
      applyTransform();
      updateStats();
      renderMinimap();
    }
  });

  window.addEventListener('mouseup', () => {
    state.dragging = null;
    state.panning = false;
  });

  // Zoom
  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newZoom = Math.min(3, Math.max(0.1, state.zoom * delta));

    // Zoom toward mouse position
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    state.pan.x = mx - (mx - state.pan.x) * (newZoom / state.zoom);
    state.pan.y = my - (my - state.pan.y) * (newZoom / state.zoom);
    state.zoom = newZoom;

    applyTransform();
    updateStats();
    renderMinimap();
  });

  // Initial transform
  applyTransform();
}

// ---- Inspector ----

function updateInspector() {
  const content = document.getElementById('inspector-content');
  if (!state.selected || !state.graph.nodes[state.selected]) {
    content.innerHTML = `<div class="section"><p class="field" style="color: #484f58; font-size: 11px;">Select a node to inspect</p></div>`;
    return;
  }

  const node = state.graph.nodes[state.selected];
  const mixins = (node.mixins || []).map(m => `<span class="badge mixin">${m}</span>`).join('');
  const listens = (node.listen_channels || []).map(ch => `<span class="badge channel">@listen ${ch}</span>`).join('');
  const enacts = (node.enact_commands || []).map(cmd => `<span class="badge command">@enact ${cmd}</span>`).join('');

  const channels = Object.entries(node.channels || {})
    .map(([ch, n]) => `<div class="field"><span class="label">${ch}</span> <span class="value">${n} subs</span></div>`)
    .join('') || '<div class="field" style="color:#484f58">none</div>';

  const children = (node.children || [])
    .map(cid => {
      const child = state.graph.nodes[cid];
      const name = child ? child.class_name : cid;
      return `<div class="field"><span class="value">${name}</span></div>`;
    }).join('') || '<div class="field" style="color:#484f58">none</div>';

  const config = Object.entries(node.config || {})
    .map(([k, v]) => `<div class="field"><span class="label">${k}:</span> <span class="value">${v}</span></div>`)
    .join('') || '<div class="field" style="color:#484f58">default</div>';

  content.innerHTML = `
    <div class="section">
      <h3>Identity</h3>
      <div class="field"><span class="label">Class:</span> <span class="value">${node.class_name}</span></div>
      <div class="field"><span class="label">ID:</span> <span class="value" style="font-size:10px;word-break:break-all">${node.node_id}</span></div>
      <div class="field"><span class="label">Status:</span> <span class="value">${node.status}</span></div>
      ${node.parent_id ? `<div class="field"><span class="label">Parent:</span> <span class="value" style="font-size:10px">${node.parent_id}</span></div>` : ''}
    </div>
    <div class="section">
      <h3>Mixins</h3>
      ${mixins || '<span style="color:#484f58;font-size:11px">none</span>'}
    </div>
    <div class="section">
      <h3>Handlers</h3>
      ${listens} ${enacts}
      ${!listens && !enacts ? '<span style="color:#484f58;font-size:11px">none</span>' : ''}
    </div>
    <div class="section">
      <h3>Channels</h3>
      ${channels}
    </div>
    <div class="section">
      <h3>Children</h3>
      ${children}
    </div>
    <div class="section">
      <h3>Config</h3>
      ${config}
    </div>
  `;
}

// ---- Toolbar ----

function fitToScreen() {
  const svg = document.getElementById('graph-svg');
  const positions = Object.values(state.positions);
  if (positions.length === 0) return;

  const minX = Math.min(...positions.map(p => p.x)) - 50;
  const maxX = Math.max(...positions.map(p => p.x)) + 250;
  const minY = Math.min(...positions.map(p => p.y)) - 50;
  const maxY = Math.max(...positions.map(p => p.y)) + 200;

  const rect = svg.getBoundingClientRect();
  const scaleX = rect.width / (maxX - minX || 1);
  const scaleY = rect.height / (maxY - minY || 1);
  state.zoom = Math.min(scaleX, scaleY, 2) * 0.9;
  state.pan.x = (rect.width - (maxX - minX) * state.zoom) / 2 - minX * state.zoom;
  state.pan.y = (rect.height - (maxY - minY) * state.zoom) / 2 - minY * state.zoom;

  const tg = document.getElementById('transform-group');
  tg.setAttribute('transform', `translate(${state.pan.x},${state.pan.y}) scale(${state.zoom})`);
  updateStats();
  renderMinimap();
}

function toggleAutoLayout() {
  state.autoLayout = !state.autoLayout;
  if (state.autoLayout) {
    layoutGraph();
    render();
    fitToScreen();
  }
}

function toggleInspector() {
  document.getElementById('inspector').classList.toggle('hidden');
}

// ---- Boot ----

setupInteraction();
connectWS();

// Also fetch initial state via REST in case WS takes a moment
fetch('/api/graph')
  .then(r => r.json())
  .then(data => {
    if (Object.keys(state.graph.nodes).length === 0) {
      handleSnapshot(data);
      setTimeout(fitToScreen, 100);
    }
  })
  .catch(() => {});
</script>
